<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub – Autenticação</title>

  <!-- Office.js para comunicar com o taskpane pai -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; padding: 20px;
    }
    .card {
      background: white; border-radius: 12px; padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center;
      max-width: 340px; width: 100%;
    }
    .logo {
      width: 48px; height: 48px; background: #1a56db; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    }
    .logo svg { width: 26px; height: 26px; fill: white; }
    h1 { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; color: #6b7280; font-size: 13px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb; border-top-color: #1a56db;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #fef2f2; color: #e02424; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Hub Add-in</h1>
    <p id="statusText">A redirecionar para a Microsoft...</p>
    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner"></div>
      <span id="spinnerText">A autenticar...</span>
    </div>
    <div class="error" id="errorBox" style="display:none"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://oguddaopsphkvjnqrkmg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndWRkYW9wc3Boa3ZqbnFya21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5NDczMzEsImV4cCI6MjA4MzUyMzMzMX0.sQ1MKsUQ-y0_G0seSxBCIkldquvHbU0HTKXbDwjaGCk';

    // This page's own URL — used as the OAuth redirect target
    const DIALOG_URL = 'https://afonsocanato.github.io/HostingTaskpane/taskpane/auth-dialog.html';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: { getItem: k => _m[k]||null, setItem: (k,v) => _m[k]=v, removeItem: k => delete _m[k] }, persistSession: false }
    });
    const _m = {};

    function showError(msg) {
      document.getElementById('spinnerWrap').style.display = 'none';
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorBox').textContent = msg;
    }

    async function run() {
      // Check if we're returning from the OAuth redirect (hash contains access_token)
      const hash = window.location.hash;

      if (hash && hash.includes('access_token')) {
        // ── Step 2: OAuth callback — extract session and send back to taskpane ──
        document.getElementById('statusText').textContent = 'Login efetuado com sucesso!';
        document.getElementById('spinnerText').textContent = 'A finalizar...';

        // Let Supabase parse the hash and set the session
        const { data, error } = await supabase.auth.getSession();

        if (error || !data.session) {
          // Try exchanging the hash manually
          const params = new URLSearchParams(hash.replace('#', ''));
          const accessToken = params.get('access_token');
          const refreshToken = params.get('refresh_token');

          if (!accessToken) {
            showError('Não foi possível obter a sessão. Tenta novamente.');
            return;
          }

          // Send tokens back to the taskpane via Office dialog messaging
          Office.onReady(() => {
            Office.context.ui.messageParent(JSON.stringify({
              type: 'AUTH_SUCCESS',
              access_token: accessToken,
              refresh_token: refreshToken,
            }));
          });
          return;
        }

        // Session obtained — send back to taskpane
        Office.onReady(() => {
          Office.context.ui.messageParent(JSON.stringify({
            type: 'AUTH_SUCCESS',
            access_token: data.session.access_token,
            refresh_token: data.session.refresh_token,
          }));
        });

      } else {
        // ── Step 1: No hash yet — initiate OAuth redirect ──
        document.getElementById('statusText').textContent = 'A redirecionar para a Microsoft...';

        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'azure',
          options: {
            redirectTo: DIALOG_URL,
            scopes: 'openid profile email',
            skipBrowserRedirect: false,
          }
        });

        if (error) {
          showError('Erro ao iniciar autenticação Microsoft: ' + error.message);
        }
        // The page will redirect to Microsoft — nothing more to do here
      }
    }

    run();
  </script>
</body>
</html>
