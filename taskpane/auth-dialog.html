<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub – A autenticar...</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb;
    }
    .card {
      background: white; border-radius: 12px; padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center;
      max-width: 340px; width: 100%;
    }
    .logo {
      width: 48px; height: 48px; background: #1a56db; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    }
    .logo svg { width: 26px; height: 26px; fill: white; }
    h1 { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; color: #6b7280; font-size: 13px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb; border-top-color: #1a56db;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Hub Add-in</h1>
    <p>A redirecionar para o Hub...</p>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span>A aguardar autenticação</span>
    </div>
  </div>
  <script>
    // Redireciona para o Hub com parâmetro que indica que foi aberto pelo Outlook add-in.
    // O Hub detecta ?outlook_addin=1, e após login chama Office.context.ui.messageParent()
    // com o token de sessão para fechar o dialog e autenticar o painel.
    window.location.href = 'https://hub.itxmind.com/login?outlook_addin=1';
  </script>
</body>
</html>
