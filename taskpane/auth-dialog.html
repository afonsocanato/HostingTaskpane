<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub – A autenticar...</title>
  <!-- Office.js carregado nativamente — garante context.ui.messageParent disponível -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb;
    }
    .card {
      background: white; border-radius: 12px; padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center;
      max-width: 340px; width: 100%;
    }
    .logo {
      width: 48px; height: 48px; background: #1a56db; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    }
    .logo svg { width: 26px; height: 26px; fill: white; }
    h1 { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p  { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; color: #6b7280; font-size: 13px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb; border-top-color: #1a56db;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #fef2f2; color: #e02424; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; font-size: 13px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Hub Add-in</h1>
    <p id="statusText">A autenticar...</p>
    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner"></div>
      <span id="spinnerLabel">A processar</span>
    </div>
    <div class="error" id="errorBox"></div>
  </div>

  <script>
    // Esta página é aberta como dialog pelo Office.js, por isso tem context.ui disponível.
    // O Hub redireciona para cá após login, passando os tokens no hash.
    // Ex: auth-dialog.html#access_token=xxx&refresh_token=yyy

    function showError(msg) {
      document.getElementById('spinnerWrap').style.display = 'none';
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.style.display = 'block';
    }

    Office.onReady(() => {
      const hash = window.location.hash.substring(1); // remover o #
      const params = new URLSearchParams(hash);
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');

      if (accessToken) {
        // Tokens recebidos — enviar ao taskpane e fechar o dialog
        document.getElementById('statusText').textContent = 'Login efetuado!';
        document.getElementById('spinnerLabel').textContent = 'A fechar...';

        Office.context.ui.messageParent(JSON.stringify({
          type: 'AUTH_SUCCESS',
          access_token: accessToken,
          refresh_token: refreshToken || '',
        }));
      } else {
        // Sem tokens no hash — redirecionar para o Hub para fazer login
        document.getElementById('statusText').textContent = 'A redirecionar para o Hub...';
        document.getElementById('spinnerLabel').textContent = 'A aguardar autenticação';

        // Guardar a origem deste dialog para o Hub poder redirecionar de volta
        const dialogOrigin = encodeURIComponent(window.location.href.split('#')[0]);
        window.location.href = 'https://hub.itxmind.com/auth/outlook?dialog_callback=' + dialogOrigin;
      }
    });
  </script>
</body>
</html>
