<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub – Anexar Email</title>

  <!-- Office.js MUST be loaded before anything else -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Hub fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:       #1a1f36;   /* deep navy — Hub primary */
      --primary-hover: #13172a;
      --accent:        #00c5db;   /* cyan accent */
      --danger:        #dc2626;
      --success:       #16a34a;
      --text:          #1a1f36;
      --text-muted:    #6b7280;
      --border:        #e4e7ed;
      --bg:            #f7f8fa;
      --bg-card:       #ffffff;
      --radius:        10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 14px; color: var(--text);
      background: var(--bg); padding: 16px; min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
    }
    .logo {
      width: 34px; height: 34px; background: var(--primary);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; fill: var(--accent); }
    .header-text h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2;
    }
    .header-text p { font-size: 11px; color: var(--text-muted); }
    .user-badge {
      margin-left: auto; font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .user-badge:hover { color: var(--text); }
    .user-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

    /* ── Sections ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Form ── */
    .field { margin-bottom: 14px; }
    label {
      display: block; font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--bg-card); outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,197,219,.12);
    }

    /* ── Button ── */
    .btn {
      display: block; width: 100%; padding: 11px;
      border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .15s, opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.99); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: .55; cursor: default; transform: none; }

    /* ── Alerts ── */
    .alert {
      padding: 10px 12px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .alert.show { display: block; }
    .alert-error   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }

    /* ── Search ── */
    .search-wrapper { position: relative; }
    .search-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(26,31,54,.1);
      max-height: 220px; overflow-y: auto; z-index: 100; display: none;
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg); }
    .deal-title { font-weight: 500; font-size: 13px; color: var(--text); }
    .deal-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Selected deal ── */
    .selected-deal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius); padding: 12px; margin-bottom: 14px; display: none;
    }
    .selected-deal.show { display: block; }
    .selected-deal .deal-title { font-weight: 600; color: var(--primary); }
    .change-link {
      display: inline-block; margin-top: 6px;
      font-size: 12px; color: var(--accent); cursor: pointer;
      text-decoration: none; font-weight: 500;
    }
    .change-link:hover { text-decoration: underline; }

    /* ── Email preview ── */
    .email-preview {
      background: var(--bg-card); border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: var(--radius); padding: 12px; margin-bottom: 16px;
    }
    .email-preview .subject {
      font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 4px;
    }
    .email-preview .meta { font-size: 11px; color: var(--text-muted); }

    /* ── Stage badge ── */
    .stage-badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: rgba(0,197,219,.12); color: #0e7490;
    }

    /* ── Spinner ── */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results { padding: 12px; text-align: center; color: var(--text-muted); font-size: 13px; }

    footer {
      margin-top: 24px; text-align: center; font-size: 11px;
      color: var(--text-muted); padding-top: 14px; border-top: 1px solid var(--border);
      letter-spacing: .02em;
    }
  </style>
</head>

      </div>
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;">ITXMind Hub</p>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.5;">
        Inicie sessão para anexar emails às oportunidades.
      </p>
    </div>

    <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()">
      Iniciar Sessão
    </button>
  </div>

  <!-- ── ATTACH ── -->
  <div class="section" id="sectionAttach">
    <div class="alert alert-error"   id="attachError"></div>
    <div class="alert alert-success" id="attachSuccess"></div>

    <div class="email-preview">
      <div class="subject" id="previewSubject">A carregar email...</div>
      <div class="meta"    id="previewMeta"></div>
    </div>

    <div class="field">
      <label>Oportunidade</label>

      <div class="selected-deal" id="selectedDealBox">
        <div class="deal-title" id="selectedDealTitle"></div>
        <div class="deal-meta"  id="selectedDealMeta"></div>
        <span class="change-link" onclick="clearSelectedDeal()">Alterar</span>
      </div>

      <div class="search-wrapper" id="searchWrapper">
        <input type="text" id="dealSearch"
          placeholder="Pesquisar oportunidade..."
          oninput="onSearchInput()"
          onfocus="onSearchFocus()"
          autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="btnAttach" onclick="handleAttach()" disabled>
      Anexar Email
    </button>
  </div>

  <footer>ITXMind Hub · Outlook Add-in</footer>

  <script>
    const SUPABASE_URL      = 'https://oguddaopsphkvjnqrkmg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndWRkYW9wc3Boa3ZqbnFya21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5NDczMzEsImV4cCI6MjA4MzUyMzMzMX0.sQ1MKsUQ-y0_G0seSxBCIkldquvHbU0HTKXbDwjaGCk';
    const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/attach-email-to-deal`;
    const HUB_LOGIN_URL     = 'https://afonsocanato.github.io/HostingTaskpane/taskpane/auth-dialog.html';

    const _mem = {};
    let supabaseClient = null;
    let currentUser    = null;
    let currentSession = null;
    let selectedDeal   = null;
    let emailData      = null;
    let searchTimeout  = null;

    // ── Office init ──────────────────────────────────────────────────────────
    Office.onReady(() => {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          storage: {
            getItem:    k => _mem[k] || null,
            setItem:    (k, v) => { _mem[k] = v; },
            removeItem: k => { delete _mem[k]; },
          },
          persistSession: false,
          autoRefreshToken: false,
        }
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('#searchWrapper')) {
          document.getElementById('searchResults').classList.remove('show');
        }
      });
    });

    // ── UI helpers ───────────────────────────────────────────────────────────
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('show');
    }
    function hideAlert(id) { document.getElementById(id).classList.remove('show'); }
    function setLoading(btnId, loading, label) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? `<span class="spinner"></span>${label || 'A processar...'}` : label;
    }

    // ── Auth ─────────────────────────────────────────────────────────────────
    function handleLogin() {
      hideAlert('loginError');
      setLoading('btnLogin', true, 'A abrir o Hub...');

      Office.context.ui.displayDialogAsync(
        HUB_LOGIN_URL,
        { height: 80, width: 50, promptBeforeOpen: false },
        result => {
          if (result.status === Office.AsyncResultStatus.Failed) {
            showAlert('loginError', 'Erro ao abrir o Hub: ' + result.error.message);
            setLoading('btnLogin', false, 'Iniciar Sessão');
            return;
          }

          const dialog = result.value;

          dialog.addEventHandler(Office.EventType.DialogMessageReceived, async arg => {
            dialog.close();
            let msg;
            try { msg = JSON.parse(arg.message); } catch (e) {
              showAlert('loginError', 'Erro ao processar resposta. Tenta novamente.');
              setLoading('btnLogin', false, 'Iniciar Sessão');
              return;
            }

            if (msg.type === 'AUTH_SUCCESS' && msg.access_token) {
              const { data, error } = await supabaseClient.auth.setSession({
                access_token: msg.access_token,
                refresh_token: msg.refresh_token,
              });
              if (error || !data.session) {
                showAlert('loginError', 'Sessão inválida. Tenta novamente.');
                setLoading('btnLogin', false, 'Iniciar Sessão');
                return;
              }
              currentSession = data.session;
              currentUser    = data.user;
              await initAttachView();
            } else {
              showAlert('loginError', 'Login cancelado. Tenta novamente.');
              setLoading('btnLogin', false, 'Iniciar Sessão');
            }
          });

          // 12006 = utilizador fechou o dialog manualmente, não é erro
          dialog.addEventHandler(Office.EventType.DialogEventReceived, arg => {
            setLoading('btnLogin', false, 'Iniciar Sessão');
            if (arg.error !== 12006) {
              showAlert('loginError', 'Janela fechada inesperadamente. Tenta novamente.');
            }
          });
        }
      );
    }

    async function handleSignOut() {
      currentUser = currentSession = selectedDeal = emailData = null;
      document.getElementById('userBadge').style.display = 'none';
      showSection('sectionLogin');
      setLoading('btnLogin', false, 'Iniciar Sessão');
    }

    // ── After login ──────────────────────────────────────────────────────────
    async function initAttachView() {
      showSection('sectionAttach');
      document.getElementById('userBadge').style.display = 'flex';
      document.getElementById('userEmail').textContent = currentUser.email;
      await loadEmailData();
    }

    function loadEmailData() {
      return new Promise(resolve => {
        const item = Office.context.mailbox?.item;
        if (!item) {
          emailData = {
            subject: '(email de teste)', sender_name: 'Teste',
            sender_email: 'teste@exemplo.pt', received_at: new Date().toISOString(),
            body_text: 'Teste.', internet_message_id: 'test-' + Date.now(), recipients: [],
          };
          renderEmailPreview();
          return resolve();
        }
        const subject     = item.subject || '(sem assunto)';
        const sender      = item.sender || item.from || {};
        const senderName  = sender.displayName || sender.emailAddress || '';
        const senderEmail = sender.emailAddress || '';
        const recipients  = (item.to || []).map(r => ({ name: r.displayName || '', email: r.emailAddress || '' }));
        const messageId   = item.internetMessageId || null;
        const receivedAt  = item.dateTimeCreated ? item.dateTimeCreated.toISOString() : new Date().toISOString();

        item.body.getAsync(Office.CoercionType.Text, r1 => {
          const bodyText = r1.status === Office.AsyncResultStatus.Succeeded ? r1.value || '' : '';
          item.body.getAsync(Office.CoercionType.Html, r2 => {
            const bodyHtml = r2.status === Office.AsyncResultStatus.Succeeded ? r2.value || '' : '';
            emailData = { subject, sender_name: senderName, sender_email: senderEmail,
              received_at: receivedAt, body_text: bodyText, body_html: bodyHtml,
              internet_message_id: messageId, recipients };
            renderEmailPreview();
            resolve();
          });
        });
      });
    }

    function renderEmailPreview() {
      if (!emailData) return;
      document.getElementById('previewSubject').textContent = emailData.subject;
      const date = new Date(emailData.received_at).toLocaleString('pt-PT', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('previewMeta').textContent =
        `De: ${emailData.sender_name} <${emailData.sender_email}> · ${date}`;
    }

    // ── Deal search — directo via Supabase client ────────────────────────────
    function onSearchInput() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(searchDeals, 300);
    }
    function onSearchFocus() {
      if (document.getElementById('dealSearch').value) searchDeals();
    }

    async function searchDeals() {
      const query     = document.getElementById('dealSearch').value.trim();
      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div class="no-results">A pesquisar...</div>';
      resultsEl.classList.add('show');
      try {
        let q = supabaseClient
          .from('deals')
          .select('id, title, stage, client:clients(id, name)')
          .neq('stage', 'closed_lost')
          .order('created_at', { ascending: false })
          .limit(30);

        if (query) q = q.ilike('title', `%${query}%`);

        const { data: deals, error } = await q;
        if (error) throw new Error(error.message);

        if (!deals || !deals.length) {
          resultsEl.innerHTML = '<div class="no-results">Nenhuma oportunidade encontrada</div>';
          return;
        }
        resultsEl.innerHTML = deals.map(d =>
          `<div class="search-result-item" onclick='selectDeal(${JSON.stringify(d).replace(/'/g, "&#39;")})'>
            <div class="deal-title">${esc(d.title)}</div>
            <div class="deal-meta">${d.client?.name ? esc(d.client.name) + ' · ' : ''}<span class="stage-badge">${stageLabel(d.stage)}</span></div>
          </div>`
        ).join('');
      } catch (err) {
        resultsEl.innerHTML = `<div class="no-results" style="color:var(--danger)">${err.message}</div>`;
      }
    }

    function selectDeal(deal) {
      selectedDeal = deal;
      document.getElementById('selectedDealTitle').textContent = deal.title;
      document.getElementById('selectedDealMeta').textContent =
        (deal.client?.name ? deal.client.name + ' · ' : '') + stageLabel(deal.stage);
      document.getElementById('selectedDealBox').classList.add('show');
      document.getElementById('searchWrapper').style.display = 'none';
      document.getElementById('searchResults').classList.remove('show');
      document.getElementById('btnAttach').disabled = false;
    }

    function clearSelectedDeal() {
      selectedDeal = null;
      document.getElementById('selectedDealBox').classList.remove('show');
      document.getElementById('searchWrapper').style.display = 'block';
      document.getElementById('dealSearch').value = '';
      document.getElementById('btnAttach').disabled = true;
    }

    // ── Attach email — directo via Supabase client ───────────────────────────
    async function handleAttach() {
      hideAlert('attachError');
      hideAlert('attachSuccess');
      if (!selectedDeal || !emailData) return;
      setLoading('btnAttach', true, 'A anexar...');

      try {
        const dealId   = selectedDeal.id;
        const { data: { user } } = await supabaseClient.auth.getUser();

        // 1. Gerar ficheiro HTML com o conteúdo do email
        const date = new Date(emailData.received_at).toLocaleString('pt-PT');
        const htmlContent = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>${emailData.subject}</title>
<style>body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#333}
.header{background:#f5f5f5;padding:20px;border-radius:8px;margin-bottom:20px}
.label{font-weight:bold;color:#666;font-size:12px;text-transform:uppercase}
.value{font-size:14px;margin-bottom:12px}
.body{border:1px solid #e0e0e0;padding:20px;border-radius:8px;line-height:1.6}
.footer{margin-top:20px;font-size:11px;color:#999}</style>
</head><body>
<div class="header">
  <div class="label">Assunto</div>
  <div class="value" style="font-size:18px;font-weight:bold;">${emailData.subject}</div>
  <div class="label">De</div>
  <div class="value">${emailData.sender_name} &lt;${emailData.sender_email}&gt;</div>
  <div class="label">Data</div>
  <div class="value">${date}</div>
</div>
<div class="body">${emailData.body_html || emailData.body_text.replace(/\n/g,'<br>')}</div>
<div class="footer">Anexado via Outlook Add-in por ${user?.email || ''}</div>
</body></html>`;

        // 2. Upload para o bucket deal-attachments
        const safeName = emailData.subject.replace(/[^a-zA-Z0-9\-_]/g, '_').slice(0, 50);
        const fileName = `email_${Date.now()}_${safeName}.html`;
        const filePath = `${dealId}/${fileName}`;
        const fileBlob = new Blob([htmlContent], { type: 'text/html' });

        const { error: uploadError } = await supabaseClient.storage
          .from('deal-attachments')
          .upload(filePath, fileBlob, { contentType: 'text/html' });

        if (uploadError) throw new Error('Erro no upload: ' + uploadError.message);

        // 3. Inserir registo na tabela deal_attachments
        const { data: attachmentRecord, error: insertError } = await supabaseClient
          .from('deal_attachments')
          .insert({
            deal_id:     dealId,
            file_name:   fileName,
            file_url:    filePath,
            file_type:   'text/html',
            file_size:   htmlContent.length,
            uploaded_by: user?.id || null,
          })
          .select()
          .single();

        if (insertError) throw new Error('Erro ao registar: ' + insertError.message);

        // 4. Inserir também na tabela deal_email_attachments (para o card de emails)
        const { error: emailInsertError } = await supabaseClient
          .from('deal_email_attachments')
          .insert({
            deal_id:              dealId,
            subject:              emailData.subject,
            sender_email:         emailData.sender_email,
            attached_by:          user?.id || null,
            attachment_id:        attachmentRecord.id,
            internet_message_id:  emailData.internet_message_id || null,
          });

        if (emailInsertError) throw new Error('Erro ao registar email: ' + emailInsertError.message);

        showAlert('attachSuccess', `✓ Email anexado com sucesso a "${selectedDeal.title}"`);
        setLoading('btnAttach', false, 'Anexar Email');
        setTimeout(() => { clearSelectedDeal(); hideAlert('attachSuccess'); }, 4000);

      } catch (err) {
        showAlert('attachError', `Erro: ${err.message}`);
        setLoading('btnAttach', false, 'Anexar Email');
      }
    }

    // ── Utils ────────────────────────────────────────────────────────────────
    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    const STAGE_LABELS = {
      qualification: 'Qualificação', presale: 'Pré-venda', proposal: 'Proposta',
      negotiation: 'Negociação', best_case: 'Best Case', committed: 'Committed',
      closed_won: 'Ganho', closed_lost: 'Perdido',
    };
    function stageLabel(s) { return STAGE_LABELS[s] || s || '–'; }
  </script>
</body>
</html>
